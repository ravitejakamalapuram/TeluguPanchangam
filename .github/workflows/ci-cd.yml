name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    uses: ravitejakamalapuram/.github-workflows-shared/.github/workflows/chrome-extension-ci.yml@v1.1.9
    with:
      extension-dir: '.'
      manifest-version: '3'
      strict-mode: 'false'
      run-lint: false # Enable after configuring ESLint
      run-unit-tests: false # Enable after adding tests

  cd:
    name: CD Pipeline
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ravitejakamalapuram/.github-workflows-shared/.github/workflows/chrome-extension-cd.yml@v1.1.9
    with:
      extension-dir: '.'
      publish-target: 'default'
      auto-publish: 'true'
    secrets:
      chrome-extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
      chrome-client-id: ${{ secrets.CHROME_CLIENT_ID }}
      chrome-client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
      chrome-refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
